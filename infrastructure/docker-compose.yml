services:
  postgres:
    image: postgres:16-alpine
    container_name: visulox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: visulox
      POSTGRES_USER: visulox
      POSTGRES_PASSWORD: visulox
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visulox -d visulox"]
      interval: 10s
      timeout: 5s
      retries: 5
